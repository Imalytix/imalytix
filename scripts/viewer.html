<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imalytix — 샘플 이미지 뷰어</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8fafc; --surface: #fff; --border: #e2e8f0;
    --text: #0f172a; --muted: #64748b; --accent: #0ea5e9;
    --rose: #f43f5e; --amber: #f59e0b; --emerald: #10b981;
    --radius: 16px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-stats { font-size: 12px; color: var(--muted); }

  /* ── Controls ── */
  .controls { display: flex; flex-wrap: wrap; gap: 10px;
    padding: 18px 24px; align-items: center; }
  .search-box { flex: 1; min-width: 200px; padding: 9px 14px;
    border: 1px solid var(--border); border-radius: 12px; font-size: 14px;
    background: var(--surface); outline: none; transition: border-color .15s; }
  .search-box:focus { border-color: var(--accent); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .copy-btn { padding: 9px 18px; background: var(--accent); color: #fff;
    border: none; border-radius: 12px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .15s; }
  .copy-btn:hover { background: #0284c7; }
  .copy-btn:disabled { opacity: .4; cursor: default; }
  .selected-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ── Grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; padding: 0 24px 24px; }
  .card { background: var(--surface); border: 2px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: all .18s; position: relative; }
  .card:hover { border-color: #94a3b8; transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(15,23,42,.08); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,.15); }
  .card-thumb { position: relative; aspect-ratio: 3/2; overflow: hidden; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform .25s; }
  .card:hover .card-thumb img { transform: scale(1.04); }
  .check-box { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
    border-radius: 6px; border: 2px solid rgba(255,255,255,.8);
    background: rgba(0,0,0,.25); display: flex; align-items: center;
    justify-content: center; transition: all .15s; }
  .card.selected .check-box { background: var(--accent); border-color: var(--accent); }
  .check-box::after { content: '✓'; font-size: 12px; font-weight: 700; color: #fff;
    opacity: 0; transition: opacity .1s; }
  .card.selected .check-box::after { opacity: 1; }
  .cat-badge { position: absolute; top: 8px; left: 8px; padding: 3px 8px;
    background: rgba(0,0,0,.55); color: #fff; border-radius: 6px;
    font-size: 11px; font-weight: 600; backdrop-filter: blur(4px); }
  .card-body { padding: 10px 12px 12px; }
  .card-id { font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; }
  .card-kw { font-size: 13px; font-weight: 600; color: var(--text);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .meta-tag { font-size: 10px; padding: 2px 7px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 999px; color: var(--muted); }
  .card-size { font-size: 10px; color: #94a3b8; margin-top: 4px; }

  /* ── Empty ── */
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 15px; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 24px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 20px; max-width: 900px;
    width: 100%; max-height: 90vh; overflow: auto; box-shadow: 0 25px 60px rgba(0,0,0,.3); }
  .modal-img { width: 100%; border-radius: 18px 18px 0 0; display: block;
    max-height: 55vh; object-fit: contain; background: #f1f5f9; }
  .modal-info { padding: 20px 24px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .modal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .modal-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .modal-table td:first-child { color: var(--muted); font-weight: 600; width: 120px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btn { padding: 9px 18px; border-radius: 12px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .modal-btn.primary { background: var(--text); color: #fff; }
  .modal-btn.primary:hover { background: #334155; }
  .modal-btn.secondary { background: var(--bg); color: var(--text);
    border: 1px solid var(--border); }
  .modal-btn.secondary:hover { border-color: #94a3b8; }
  .modal-close { float: right; background: none; border: none; font-size: 22px;
    cursor: pointer; color: var(--muted); line-height: 1; }

  /* ── Misc ── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text);
    color: #fff; padding: 12px 20px; border-radius: 14px; font-size: 13px;
    font-weight: 600; z-index: 300; opacity: 0; transform: translateY(8px);
    transition: all .25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Imal<span>ytix</span> <span style="font-weight:400;font-size:13px;color:#64748b">샘플 뷰어</span></div>
  <div class="header-stats" id="statsText">manifest.json 로드 중…</div>
</header>

<div class="controls">
  <input class="search-box" id="searchInput" placeholder="키워드, 카테고리, ID 검색…" />
  <div class="filter-chips" id="filterChips">
    <button class="chip active" data-cat="all">전체</button>
  </div>
  <div style="flex:1"></div>
  <span class="selected-count" id="selectedCount"></span>
  <button class="copy-btn" id="copyBtn" disabled>ID 복사</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-info" style="padding-bottom:0;padding-top:16px">
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-info">
      <div class="modal-title" id="modalTitle"></div>
      <table class="modal-table" id="modalTable"></table>
      <div class="modal-actions">
        <button class="modal-btn primary" id="modalSelect">선택에 추가</button>
        <button class="modal-btn secondary" id="modalClose2">닫기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let manifest = { samples: [] };
let filtered = [];
let selectedIds = new Set();
let currentModal = null;
let activeCategory = 'all';

const MANIFEST_URL = '../samples/manifest.json';

const grid         = document.getElementById('grid');
const searchInput  = document.getElementById('searchInput');
const filterChips  = document.getElementById('filterChips');
const statsText    = document.getElementById('statsText');
const selectedCount= document.getElementById('selectedCount');
const copyBtn      = document.getElementById('copyBtn');
const modalOverlay = document.getElementById('modalOverlay');
const modalImg     = document.getElementById('modalImg');
const modalTitle   = document.getElementById('modalTitle');
const modalTable   = document.getElementById('modalTable');
const modalSelect  = document.getElementById('modalSelect');

// ── Load manifest ──────────────────────────────────────────────────────────
fetch(MANIFEST_URL)
  .then(r => r.ok ? r.json() : Promise.reject(r.status))
  .then(data => {
    manifest = data;
    statsText.textContent = `총 ${data.total}장 / ${new Date(data.generated_at).toLocaleDateString('ko')} 생성`;
    buildCategoryChips();
    applyFilter();
  })
  .catch(err => {
    statsText.textContent = '⚠ manifest.json 로드 실패 (' + err + ')';
    grid.innerHTML = '<div class="empty">viewer.html을 scripts/ 폴더에서 열거나,<br>웹 서버로 프로젝트 루트를 서빙해주세요.</div>';
  });

// ── Category chips ─────────────────────────────────────────────────────────
function buildCategoryChips() {
  const cats = {};
  manifest.samples.forEach(s => {
    if (!cats[s.category_id]) cats[s.category_id] = s.category_label_ko;
  });
  Object.entries(cats).forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.cat = id;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      activeCategory = id;
      filterChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    });
    filterChips.appendChild(btn);
  });
  filterChips.querySelector('[data-cat="all"]').addEventListener('click', () => {
    activeCategory = 'all';
    filterChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    filterChips.querySelector('[data-cat="all"]').classList.add('active');
    applyFilter();
  });
}

// ── Filter ─────────────────────────────────────────────────────────────────
function applyFilter() {
  const q = searchInput.value.toLowerCase().trim();
  filtered = manifest.samples.filter(s => {
    if (activeCategory !== 'all' && s.category_id !== activeCategory) return false;
    if (!q) return true;
    return (
      s.id.toLowerCase().includes(q) ||
      s.keyword?.toLowerCase().includes(q) ||
      s.category_label_ko?.includes(q) ||
      s.tags?.some(t => t.toLowerCase().includes(q))
    );
  });
  renderGrid();
}

searchInput.addEventListener('input', applyFilter);

// ── Render grid ────────────────────────────────────────────────────────────
function renderGrid() {
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
    return;
  }

  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card' + (selectedIds.has(s.id) ? ' selected' : '');
    card.dataset.id = s.id;

    const imgPath = '../' + s.path;
    card.innerHTML = `
      <div class="card-thumb">
        <img src="${imgPath}" alt="${s.keyword}" loading="lazy" />
        <div class="cat-badge">${s.category_label_ko}</div>
        <div class="check-box"></div>
      </div>
      <div class="card-body">
        <div class="card-id">${s.id}</div>
        <div class="card-kw">${s.keyword}</div>
        <div class="card-size">${s.width}×${s.height} · ${s.file_size_kb}KB · ${s.source}</div>
      </div>`;

    card.addEventListener('click', e => {
      if (e.target.closest('.check-box')) {
        toggleSelect(s.id);
        card.classList.toggle('selected', selectedIds.has(s.id));
        updateSelectionUI();
      } else {
        openModal(s);
      }
    });
    grid.appendChild(card);
  });
}

// ── Selection ──────────────────────────────────────────────────────────────
function toggleSelect(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
}

function updateSelectionUI() {
  const n = selectedIds.size;
  selectedCount.textContent = n ? `${n}개 선택됨` : '';
  copyBtn.disabled = n === 0;
}

copyBtn.addEventListener('click', () => {
  const ids = [...selectedIds].join('\n');
  navigator.clipboard.writeText(ids).then(() => showToast(`${selectedIds.size}개 ID 복사 완료`));
});

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(s) {
  currentModal = s;
  modalImg.src = '../' + s.path;
  modalImg.alt = s.keyword;
  modalTitle.textContent = `${s.id} — ${s.keyword}`;

  const rows = [
    ['카테고리', `${s.category_label_ko} (${s.category_id})`],
    ['파일명',   s.filename],
    ['크기',     `${s.width}×${s.height}px · ${s.file_size_kb}KB`],
    ['소스',     s.source_url ? `<a href="${s.source_url}" target="_blank">${s.source}</a>` : s.source],
    ['작성자',   s.author_url ? `<a href="${s.author_url}" target="_blank">${s.author}</a>` : s.author],
    ['라이선스', s.license],
    ['테스트 용도', (s.test_purposes || []).join(', ')],
    ['태그',     (s.tags || []).join(', ') || '—'],
  ];

  modalTable.innerHTML = rows.map(([k, v]) =>
    `<tr><td>${k}</td><td>${v || '—'}</td></tr>`
  ).join('');

  modalSelect.textContent = selectedIds.has(s.id) ? '선택 해제' : '선택에 추가';
  modalOverlay.classList.remove('hidden');
}

function closeModal() {
  modalOverlay.classList.add('hidden');
  currentModal = null;
}

modalSelect.addEventListener('click', () => {
  if (!currentModal) return;
  toggleSelect(currentModal.id);
  modalSelect.textContent = selectedIds.has(currentModal.id) ? '선택 해제' : '선택에 추가';
  updateSelectionUI();
  const card = grid.querySelector(`[data-id="${currentModal.id}"]`);
  if (card) card.classList.toggle('selected', selectedIds.has(currentModal.id));
  showToast(selectedIds.has(currentModal.id) ? `${currentModal.id} 선택됨` : `${currentModal.id} 선택 해제`);
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalClose2').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}
</script>
</body>
</html>
